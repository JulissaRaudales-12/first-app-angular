<section class="add-form-container">
    <h2 class="form-heading">Add New Location</h2>
    
    <form [formGroup]="dataToSendForm" (ngSubmit)="Onsubmit()">
      <div class="form-group">
      <label>ID de la Propiedad</label>
      <input type="number" formControlName="id" placeholder="Ej: 101">
    </div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="Enter name">
      </div>

      <div class="form-group">
        <label>City</label>
        <input type="text" formControlName="city" placeholder="Enter city">
      </div>

      <div class="form-group">
        <label>State</label>
        <input type="text" formControlName="state" placeholder="Enter state">
      </div>

      <div class="form-group">
        <label>Photo URL</label>
        <input type="url" formControlName="photo" placeholder="https://...">
      </div>

      <div class="form-group">
        <label>Available Units</label>
        <input type="number" formControlName="availableUnits" placeholder="Enter available units">
      </div>

      <div class="checkbox-row">
        <label class="checkbox-item">
          <input type="checkbox" formControlName="wifi"> Wifi
        </label>
        <label class="checkbox-item">
          <input type="checkbox" formControlName="laundry"> Laundry
        </label>
      </div>

      <button type="submit" class="submit-button" [disabled]="dataToSendForm.invalid">
        Save Property
      </button>
    </form>
  </section>
